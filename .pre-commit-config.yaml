repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: ruff format .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: Ruff Check (Fix)
        entry: ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: check-api-parity
        name: Check API Parity against MLX
        entry: python3 scripts/check_api_parity.py
        language: system
        types: [python]
        pass_filenames: false

      - id: check-compiler-test-completeness
        name: Check Compiler Parity Test Completeness
        entry: python3 scripts/check_compiler_test_completeness.py
        language: system
        types: [python]
        pass_filenames: false

#      - id: pytest-coverage
#        name: Run Pytest Coverage
