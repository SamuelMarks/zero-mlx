name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov build
        if [ -f "pyproject.toml" ]; then pip install -e .; fi
        if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi

    - name: Check Code Formatting (Ruff)
      run: ruff format --check .

    - name: Check Linting (Ruff)
      run: ruff check .

    - name: Check API Parity
      run: |
        python3 scripts/check_api_parity.py
        if ! git diff --exit-code MLX_MISSING_API.md; then
          echo "API Parity missing file MLX_MISSING_API.md was updated. Please run scripts/check_api_parity.py locally and commit the changes."
          exit 1
        fi

    - name: Check Compiler Test Completeness
      run: |
        python3 scripts/check_compiler_test_completeness.py
        if ! git diff --exit-code COMPILER_TEST_PARITY.md; then
          echo "COMPILER_TEST_PARITY.md was updated. Please run scripts/check_compiler_test_completeness.py locally and commit the changes."
          exit 1
        fi

    - name: Test & Coverage
      run: |
        PYTHONPATH=src:tests/official pytest tests/official --cov=src/zero_mlx --cov-report=xml
        
    - name: Update Badges
      run: |
        python scripts/update_badges.py
        if ! git diff --exit-code README.md; then
          echo "Coverage badges in README.md are out of date. Please run pre-commit or the update badges script locally and commit the changes."
          exit 1
        fi

    - name: Build Package
      run: python -m build
